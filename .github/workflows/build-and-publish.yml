name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or commit SHA)
        required: false
        default: main
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Resolve build variables
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.ref }}" ]; then
            checkout_ref="${{ inputs.ref }}"
          else
            checkout_ref="${GITHUB_REF}"
          fi

          ref_name="$checkout_ref"
          ref_name="${ref_name#refs/heads/}"
          ref_name="${ref_name#refs/tags/}"
          version="$ref_name"
          safe_ref_tag="$(echo "$ref_name" | sed 's/[^a-zA-Z0-9_.-]/-/g')"

          {
            echo "checkout_ref=$checkout_ref"
            echo "version=$version"
            echo 'image_tags<<EOF'
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"

            if [ "$checkout_ref" = "refs/heads/main" ] || [ "$ref_name" = "main" ]; then
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            fi

            if echo "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$version"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$(echo "$version" | sed -E 's/^(v[0-9]+\.[0-9]+)\.[0-9]+$/\1/')"
            elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$safe_ref_tag"
            fi

            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.checkout_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.image_tags }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create deploy package
        run: |
          mkdir -p deploy-package
          cp docker-compose.yml deploy-package/
          cp start.sh deploy-package/
          cp -r prisma deploy-package/
          tar -czf docker-compose-deploy.tar.gz -C deploy-package .

      - name: Upload deploy package artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-deploy
          path: docker-compose-deploy.tar.gz
          retention-days: 90
